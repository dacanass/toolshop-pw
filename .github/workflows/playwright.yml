# Nombre del workflow que aparecerá en la pestaña "Actions" de GitHub
name: Playwright Tests (Chrome Only)

on:
  push:
    branches: [main, master, quality/test-refactoring]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # Clave fija para chromium
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # Instalamos solo chromium para ahorrar espacio y tiempo
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        # Ejecutamos específicamente el proyecto 'chromium'
        run: npx playwright test --config=src/config/playwright.config.ts --project=chromium
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_URL: ${{ secrets.API_URL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 30
